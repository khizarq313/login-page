<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="overlay"></div>
    <section class="result">
      <div class="loginSuccess">
        <h3>Login Success!</h3>
        <p>Welcome Khizar!</p>
        <button href="#" class="success-btn">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          OK
        </button>
      </div>
      <div class="loginFailed">
        <h3>Login Failed!</h3>
        <p>Please enter valid username or password</p>
        <button href="#" class="fail-btn">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          Try Again
        </button>
      </div>
    </section>
    <div class="login-box">
      <h2>Login</h2>
      <form>
        <div class="user-box">
          <input type="text" />
          <label>Username</label>
        </div>
        <div class="user-box">
          <input type="password" />
          <label>Password</label>
        </div>
        <button href="#" class="submitbutton" type="submit">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          Submit
        </button>
      </form>
    </div>
  </body>
</html>
